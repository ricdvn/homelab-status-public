<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homelab Status</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">Estado publico minimo</p>
      <h1>Homelab Status</h1>
      <div id="overall" class="badge loading">Cargando</div>
    </header>

    <section class="meta">
      <article class="panel">
        <span class="label">Ultima actualizacion</span>
        <strong id="updated-at">-</strong>
      </article>
      <article class="panel">
        <span class="label">Fuente</span>
        <strong id="source">-</strong>
      </article>
      <article class="panel">
        <span class="label">Checks</span>
        <strong id="count">-</strong>
      </article>
    </section>

    <section id="checks" class="checks"></section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
